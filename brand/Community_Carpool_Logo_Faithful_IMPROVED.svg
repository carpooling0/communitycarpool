<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 342">
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; font-weight: bold; }
      .community-text { font-size: 72px; fill: #A4D65E; }
      .carpool-text { font-size: 72px; fill: #1B5C3A; }
      .tagline-text { font-family: Georgia, serif; font-size: 24px; font-style: italic; fill: #555555; }
    </style>
  </defs>

  <!-- LEFT PIN - Dark Green (#1B5C3A) -->
  <g id="left-pin">
    <!-- Main pin shape -->
    <path d="M 280 80 C 240 80 210 110 210 160 C 210 220 280 290 280 290 C 280 290 350 220 350 160 C 350 110 320 80 280 80 Z" 
          fill="#1B5C3A" stroke="none"/>
    <!-- White circle inside -->
    <circle cx="280" cy="150" r="35" fill="#FFFFFF"/>
  </g>

  <!-- RIGHT PIN - Bright Green (#B4E035) -->
  <g id="right-pin">
    <!-- Main pin shape -->
    <path d="M 420 80 C 380 80 350 110 350 160 C 350 220 420 290 420 290 C 420 290 490 220 490 160 C 490 110 460 80 420 80 Z" 
          fill="#B4E035" stroke="none"/>
    <!-- White circle inside -->
    <circle cx="420" cy="150" r="35" fill="#FFFFFF"/>
  </g>

  <!-- EXTENDED ARC AT INTERSECTION - Full convex coverage -->
  <g id="intersection-arc">
    <!-- Extended convex arc that fully covers the intersection -->
    <path d="M 350 160 Q 385 210 420 160 Q 385 185 350 160 Z" 
          fill="#B4E035" opacity="0.7" stroke="none"/>
    <!-- Blended darker overlay for depth -->
    <path d="M 360 165 Q 390 200 410 165 Q 390 180 360 165 Z" 
          fill="#1B5C3A" opacity="0.5" stroke="none"/>
  </g>

  <!-- SWOOSH - Curved line beneath pins -->
  <g id="swoosh">
    <!-- Main swoosh line (dark green) -->
    <path d="M 220 250 Q 350 310 480 250" 
          stroke="#1B5C3A" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Secondary swoosh line (bright green, behind) -->
    <path d="M 230 265 Q 350 320 470 265" 
          stroke="#B4E035" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  </g>

  <!-- TEXT: COMMUNITY -->
  <text class="community-text" x="540" y="140" letter-spacing="2">COMMUNITY</text>

  <!-- TEXT: CARPOOL -->
  <text class="carpool-text" x="540" y="220" letter-spacing="1">CARPOOL</text>

  <!-- TAGLINE: Share rides. Cut emissions. -->
  <text class="tagline-text" x="280" y="320">Share rides. Cut emissions.</text>
</svg>
